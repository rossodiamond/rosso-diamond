name: Galeri listesini guncelle

on:
  push:
    paths:
      - "images/gallery/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  guncelle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: gallery.json olustur
        run: |
          python3 - <<'PYEOF'
          import json, os, re
          pat = re.compile(r'\.(jpe?g|png|webp)$', re.I)
          base = 'images/gallery'
          out = {}
          root_files = sorted(f for f in os.listdir(base)
                              if os.path.isfile(os.path.join(base, f)) and pat.search(f))
          if root_files:
              out['_genel'] = root_files
          for d in sorted(os.listdir(base)):
              full = os.path.join(base, d)
              if os.path.isdir(full):
                  fs = sorted(f for f in os.listdir(full) if pat.search(f))
                  if fs:
                      out[d] = fs
          with open('gallery.json', 'w', encoding='utf-8') as fh:
              json.dump(out, fh, ensure_ascii=False)
          print(json.dumps(out, ensure_ascii=False, indent=1))
          PYEOF

      - name: Degisikligi kaydet
        run: |
          git config user.name "galeri-bot"
          git config user.email "actions@users.noreply.github.com"
          git add gallery.json
          git diff --cached --quiet || (git commit -m "Galeri listesi guncellendi" && git push)
